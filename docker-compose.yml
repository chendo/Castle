services:
  castle:
    build: .
    container_name: ${CASTLE_CONTAINER_NAME:-castle}
    volumes:
      - .:/workspace
      - deno-cache:/root/.cache/deno
    # Secrets and per-deployment values come straight from .env to avoid the
    # shell-env-shadowing trap that ${VAR} substitution suffers from. URLs keep
    # ${VAR:-default} so a missing .env still boots with sensible Docker hosts.
    env_file:
      - path: .env
        required: false
    environment:
      - HA_URL=${HA_URL:-http://homeassistant.local:8123}
      - OPENAI_URL=${OPENAI_URL:-http://host.docker.internal:1234/v1}
      # HA_TOKEN normally arrives via env_file (.env). Re-declaring it here
      # lets the test runner override it from .env.test.compose without
      # touching the dev .env, since `environment:` wins over `env_file:`.
      - HA_TOKEN=${HA_TOKEN:-}
    # If your runtime needs a custom host alias (Lima, Podman, etc.), put it in
    # a local `docker-compose.override.yml` (gitignored) — for example:
    #   services:
    #     castle:
    #       extra_hosts:
    #         - "host.docker.internal:192.0.2.10"
    ports:
      - "127.0.0.1:${CASTLE_PORT:-7091}:7090"
    restart: unless-stopped

  # Test-only Home Assistant instance using the `demo:` configuration.
  # Provides a deterministic set of ~50 entities (lights, switches, climate,
  # cameras, automations, dashboards, etc.) for reproducible integration tests.
  ha-demo:
    image: homeassistant/home-assistant:latest
    container_name: ${HA_DEMO_CONTAINER_NAME:-ha-demo}
    volumes:
      - ./tests/integration/ha-demo-config:/config
      - /run/dbus:/run/dbus:ro
    environment:
      - TZ=UTC
    ports:
      - "127.0.0.1:${CASTLE_TEST_HA_PORT:-9123}:8123"
    # /manifest.json is unauthenticated; /api/ returns 401 once HA is up,
    # which curl -f treats as failure and the container never goes healthy.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8123/manifest.json"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  # One-shot build service: `docker compose run --rm web-build`
  # Writes web/dist/ on the host (via the workspace mount); castle serves from there.
  web-build:
    image: node:20-alpine
    working_dir: /workspace/web
    volumes:
      - .:/workspace
    command: sh -c "npm install --no-audit --no-fund && npm run build"
    profiles: ["build"]

  # Continuous rebuild during frontend iteration.
  # Start with: `docker compose --profile dev up -d web-watch`
  # Stop with:  `docker compose --profile dev stop web-watch`
  # castle keeps serving web/dist/ — refresh the browser after each rebuild.
  web-watch:
    image: node:20-alpine
    container_name: castle-web-watch
    working_dir: /workspace/web
    volumes:
      - .:/workspace
    command: sh -c "npm install --no-audit --no-fund && npx vite build --watch --logLevel warn"
    profiles: ["dev"]
    restart: unless-stopped

volumes:
  deno-cache:
