services:
  hai:
    build: .
    container_name: hai
    volumes:
      - .:/workspace
      - deno-cache:/root/.cache/deno
    environment:
      - HA_URL=${HA_URL:-http://homeassistant.local:8123/}
      - HA_TOKEN=${HA_TOKEN}
      - LM_STUDIO_URL=${LM_STUDIO_URL:-http://host.docker.internal:1234/v1}
      - LM_STUDIO_API_KEY=${LM_STUDIO_API_KEY}
    extra_hosts:
      - "host.docker.internal:host.docker.internal"
    ports:
      - "127.0.0.1:${HAI_PORT:-7091}:7090"
    restart: unless-stopped

  # One-shot build service: `docker compose run --rm web-build`
  # Writes web/dist/ on the host (via the workspace mount); hai serves from there.
  web-build:
    image: node:20-alpine
    working_dir: /workspace/web
    volumes:
      - .:/workspace
    command: sh -c "npm install --no-audit --no-fund && npm run build"
    profiles: ["build"]

  # Continuous rebuild during frontend iteration.
  # Start with: `docker compose --profile dev up -d web-watch`
  # Stop with:  `docker compose --profile dev stop web-watch`
  # hai keeps serving web/dist/ — refresh the browser after each rebuild.
  web-watch:
    image: node:20-alpine
    container_name: hai-web-watch
    working_dir: /workspace/web
    volumes:
      - .:/workspace
    command: sh -c "npm install --no-audit --no-fund && npx vite build --watch --logLevel warn"
    profiles: ["dev"]
    restart: unless-stopped

volumes:
  deno-cache:
