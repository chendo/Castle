name: Castle
version: "0.3.1"
slug: castle
description: Natural-language Home Assistant agent backed by your own LLM.
url: https://github.com/chendo/castle
arch:
  - amd64
  - aarch64
init: false
boot: auto
startup: services
# manager role + hassio_api: true are required for the ha_list_addons /
# ha_update_addon tools. ha_update_addon is default-disabled in settings.json
# so the wider permission isn't reachable via the LLM unless the user
# explicitly turns it on.
hassio_role: manager
hassio_api: true
homeassistant_api: true
homeassistant: "2024.1.0"
ingress: true
ingress_port: 7090
panel_icon: mdi:castle
panel_title: Castle
options:
  llm_url: "http://homeassistant.local:1234/v1"
  llm_type: openai-completions
  llm_api_key: ""
  model_name: "unsloth/qwen3.6-35b-a3b"
  automation_history_max_versions: 50
  dashboard_history_max_versions: 20
schema:
  llm_url: url
  llm_type: list(openai-completions|openai-responses|anthropic|google|google-vertex|azure-openai-responses|mistral)
  llm_api_key: password?
  model_name: str?
  ha_url: url?
  ha_token: password?
  automation_history_max_versions: int(0,)?
  dashboard_history_max_versions: int(0,)?
